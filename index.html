<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Sedang Dalam Pemeliharaan</title>
  
  <!-- Mengimpor Google Font Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <style>
    /* Reset & Variabel */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
    }

    :root {
      --bg-color: #060713;
      --primary-color: #00f2fe;
      --secondary-color: #4facfe;
      --accent-color: #bd00ff;
      --text-color: #ffffff;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    /* Animasi Latar Belakang */
    .bg-orbs {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 1;
      pointer-events: none;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
      animation: float 15s infinite alternate ease-in-out;
    }

    .orb-1 {
      width: 300px;
      height: 300px;
      background: var(--primary-color);
      top: -50px;
      left: -50px;
    }

    .orb-2 {
      width: 400px;
      height: 400px;
      background: var(--accent-color);
      bottom: -100px;
      right: -50px;
      animation-delay: -5s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 50px) scale(1.2); }
    }

    /* Container Utama */
    .main-container {
      position: relative;
      z-index: 2;
      width: 90%;
      max-width: 1100px;
      margin: 20px auto;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 50px;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 40px;
      align-items: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    /* Bagian Teks & Konten */
    .content-section {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .badge {
      align-self: flex-start;
      background: rgba(0, 242, 254, 0.1);
      border: 1px solid var(--primary-color);
      color: var(--primary-color);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 800;
      line-height: 1.2;
      background: linear-gradient(135deg, #ffffff 30%, var(--primary-color));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: rgba(255, 255, 255, 0.7);
      font-size: 1rem;
      line-height: 1.6;
      max-width: 500px;
    }

    /* Indikator Status */
    .status-container {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 5px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      background-color: var(--primary-color);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--primary-color);
      animation: pulse 1.8s infinite alternate ease-in-out;
    }

    .status-text {
      font-size: 0.95rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.9);
      letter-spacing: 0.5px;
    }

    @keyframes pulse {
      0% { transform: scale(0.8); opacity: 0.4; }
      100% { transform: scale(1.3); opacity: 1; }
    }

    /* Bagian Visual (Kubus 3D) */
    .visual-section {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 350px;
    }

    /* Kubus 3D Menggunakan CSS murni */
    .cube-container {
      width: 200px;
      height: 200px;
      perspective: 1000px;
    }

    .cube {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      animation: rotateCube 15s infinite linear;
    }

    .face {
      position: absolute;
      width: 200px;
      height: 200px;
      background: rgba(6, 7, 19, 0.7);
      border: 2px solid var(--primary-color);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: var(--primary-color);
      box-shadow: 0 0 30px rgba(0, 242, 254, 0.2);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }

    /* Grid Pola Teknologi Pada Sisi Kubus */
    .face::before {
      content: '';
      position: absolute;
      top: 10%;
      left: 10%;
      width: 80%;
      height: 80%;
      border: 1px dashed var(--secondary-color);
      opacity: 0.5;
    }

    .face::after {
      content: '⚡';
      font-size: 2.5rem;
      filter: drop-shadow(0 0 10px var(--primary-color));
    }

    /* Transformasi Sisi-Sisi Kubus */
    .front  { transform: rotateY(  0deg) translateZ(100px); }
    .back   { transform: rotateY(180deg) translateZ(100px); }
    .right  { transform: rotateY( 90deg) translateZ(100px); }
    .left   { transform: rotateY(-90deg) translateZ(100px); }
    .top    { transform: rotateX( 90deg) translateZ(100px); }
    .bottom { transform: rotateX(-90deg) translateZ(100px); }

    @keyframes rotateCube {
      0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
      100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg); }
    }

    /* Responsive Design (Ponsel & Tablet) */
    @media (max-width: 992px) {
      .main-container {
        grid-template-columns: 1fr;
        padding: 40px 30px;
        text-align: center;
        gap: 30px;
      }

      .badge, .status-container {
        align-self: center;
      }

      h1 {
        font-size: 2.2rem;
      }

      p {
        margin: 0 auto;
      }

      .visual-section {
        height: 250px;
        order: -1; /* Pindahkan visual 3D ke atas pada layar HP */
      }

      .cube-container {
        width: 150px;
        height: 150px;
      }

      .face {
        width: 150px;
        height: 150px;
      }

      .front  { transform: rotateY(  0deg) translateZ(75px); }
      .back   { transform: rotateY(180deg) translateZ(75px); }
      .right  { transform: rotateY( 90deg) translateZ(75px); }
      .left   { transform: rotateY(-90deg) translateZ(75px); }
      .top    { transform: rotateX( 90deg) translateZ(75px); }
      .bottom { transform: rotateX(-90deg) translateZ(75px); }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>

  <!-- Efek Partikel/Bola Latar Belakang -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <!-- Container Utama -->
  <main class="main-container">
    
    <!-- Bagian Info & Teks -->
    <section class="content-section">
      <div class="badge">Pemeliharaan Sistem</div>
      <h1>Kami Sedang Memperbarui Sesuatu yang Hebat</h1>
      <p>Kami sedang melakukan pemeliharaan rutin untuk meningkatkan kecepatan dan keamanan sistem. Mohon tunggu beberapa saat, kami akan segera kembali online.</p>
      
      <!-- Indikator Status Aktif (Menggantikan Timer) -->
      <div class="status-container">
        <div class="status-dot"></div>
        <span class="status-text">Proses optimasi sedang berlangsung...</span>
      </div>
    </section>

    <!-- Bagian Animasi 3D -->
    <section class="visual-section">
      <div class="cube-container">
        <div class="cube">
          <div class="face front"></div>
          <div class="face back"></div>
          <div class="face right"></div>
          <div class="face left"></div>
          <div class="face top"></div>
          <div class="face bottom"></div>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
